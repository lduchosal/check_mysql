# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@3542bca2639a428e1796aaa6a2ffef0c0f575566 # v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pdm
        pdm install
        pdm install -G dev
    - name: Build with pdm
      run: |
        pdm build
    - name: Test with pytest (coverage)
      run: |
        pdm run test-ci
    # SonarCloud reads coverage.xml. Upload it once, from the 3.13 job,
    # to feed the dedicated SonarCloud job below.
    - name: Upload coverage.xml for SonarCloud job
      if: matrix.python-version == '3.13'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-xml
        path: coverage.xml
        if-no-files-found: error
        retention-days: 1

  sonarcloud:
    name: SonarCloud
    needs: build
    runs-on: ubuntu-latest
    # Fork PRs cannot read SONAR_TOKEN; skip the scan there to avoid a hard fail.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
    - uses: actions/checkout@v4
      with:
        # SonarCloud uses git blame to attribute issues to authors / new code.
        fetch-depth: 0
    - name: Download coverage.xml
      uses: actions/download-artifact@v4
      with:
        name: coverage-xml
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: https://sonarcloud.io
