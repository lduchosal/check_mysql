[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
# E2E tests need the local MySQL server: excluded by default, run them
# explicitly with `pdm run test-e2e` (the -m on its command line wins).
addopts = -v --tb=short -m "not e2e"
markers =
    e2e: end-to-end tests against the local MySQL server (check_mysql.ini)
