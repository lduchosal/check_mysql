sonar.projectKey=lduchosal_check_mysql
sonar.organization=lduchosal

sonar.sources=check_mysql
sonar.tests=tests
sonar.test.inclusions=tests/**

sonar.python.version=3.10,3.11,3.12,3.13
sonar.python.coverage.reportPaths=coverage.xml

# Drop non-shipped / generated code from the analysis surface.
sonar.exclusions=htmlcov/**,dist/**,build/**,scripts/**,**/__pycache__/**

# Coverage exclusions: tests + entry stubs.
sonar.coverage.exclusions=tests/**,check_mysql/__main__.py,check_mysql/cli/__main__.py

# False positive: the analyzer's pymysql stubs claim Connection.cursor() takes
# no argument, but PyMySQL 2.2.8 ships cursor(self, cursor=None) — passing a
# cursor class positionally is the documented API (verified against the
# installed package; e2e suite green against a real MySQL 8.4.9).
sonar.issue.ignore.multicriteria=s930cursor
sonar.issue.ignore.multicriteria.s930cursor.ruleKey=python:S930
sonar.issue.ignore.multicriteria.s930cursor.resourceKey=check_mysql/core/mysql_client.py
